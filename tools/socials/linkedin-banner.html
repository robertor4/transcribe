<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Neural Summary — LinkedIn Banner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Merriweather:ital,wght@0,300;0,400;0,700;0,900;1,300;1,400;1,700;1,900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #1a1030;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 0 60px;
      min-height: 100vh;
    }

    .banner {
      position: relative;
      width: 1584px;
      height: 396px;
      overflow: hidden;
      background: #22184C;
    }

    /* ─── Ambient gradients — real DOM elements (html2canvas compatible) ─── */
    .glow {
      position: absolute;
      z-index: 0;
      border-radius: 50%;
    }
    .glow-purple-tl {
      top: -60%;
      left: -15%;
      width: 80%;
      height: 200%;
      background: radial-gradient(ellipse at center, rgba(138,136,232,0.28) 0%, transparent 65%);
    }
    .glow-magenta-br {
      bottom: -60%;
      right: -15%;
      width: 75%;
      height: 200%;
      background: radial-gradient(ellipse at center, rgba(201,60,217,0.22) 0%, transparent 65%);
    }
    .glow-purple-tr {
      top: -40%;
      right: 0;
      width: 50%;
      height: 150%;
      background: radial-gradient(ellipse at center, rgba(138,136,232,0.15) 0%, transparent 65%);
    }
    .glow-magenta-bl {
      bottom: -30%;
      left: 5%;
      width: 45%;
      height: 130%;
      background: radial-gradient(ellipse at center, rgba(201,60,217,0.12) 0%, transparent 65%);
    }

    /* ─── Profile picture safe zone indicator (hidden by default) ─── */
    .safe-zone {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 340px;
      height: 396px;
      z-index: 50;
      /* Uncomment below to visualize the overlap zone */
      /* background: rgba(255,0,0,0.1); border-right: 1px dashed rgba(255,0,0,0.3); */
    }

    /* ─── Content container — shifted right to avoid profile pic ─── */
    .content {
      position: absolute;
      inset: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      padding: 0 80px 0 380px; /* 380px left padding clears the profile picture */
    }

    .text-block {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 12px;
    }

    /* ─── Eyebrow tag — DM Mono, matching landing ─── */
    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      font-weight: 400;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #14D0DC;
    }
    .eyebrow .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #14D0DC;
      box-shadow: 0 0 8px rgba(20,208,220,0.6);
    }

    /* ─── Headline — Merriweather, matching landing hero ─── */
    .headline {
      font-family: 'Merriweather', Georgia, 'Times New Roman', serif;
      font-weight: 900;
      font-size: 52px;
      line-height: 1.15;
      color: #fff;
      letter-spacing: -0.5px;
    }
    .headline em {
      font-style: italic;
      color: #14D0DC;
    }

    /* ─── Body text ─── */
    .body {
      font-family: 'DM Mono', monospace;
      font-size: 15px;
      font-weight: 400;
      color: rgba(255,255,255,0.45);
      letter-spacing: 0.5px;
      margin-top: 4px;
    }

    /* ─── URL ─── */
    .url {
      position: absolute;
      bottom: 20px;
      right: 36px;
      z-index: 10;
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      font-weight: 400;
      letter-spacing: 1.5px;
      color: rgba(255,255,255,0.2);
    }

    /* ─── Lionel ─── */
    .lionel-container {
      position: absolute;
      right: 40px;
      bottom: 0;
      z-index: 15;
      width: 280px;
      height: 396px;
      display: flex;
      align-items: flex-end;
      justify-content: center;
    }
    .lionel-container img {
      width: 260px;
      height: auto;
      filter: drop-shadow(0 0 60px rgba(141,106,250,0.3));
    }

    /* ─── Purple glow behind Lionel ─── */
    .lionel-glow {
      position: absolute;
      right: 10px;
      bottom: -40px;
      width: 380px;
      height: 440px;
      background: radial-gradient(ellipse at 50% 60%, rgba(141,106,250,0.25) 0%, transparent 65%);
      z-index: 12;
      border-radius: 50%;
    }

    /* ─── Save button ─── */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-top: 28px;
      z-index: 100;
    }
    .save-btn {
      font-family: 'DM Mono', monospace;
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 1px;
      color: #fff;
      background: #8D6AFA;
      border: none;
      padding: 12px 32px;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .save-btn:hover {
      background: #7A5AE0;
      transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(141,106,250,0.35);
    }
    .save-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }
    .toolbar .hint {
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      color: rgba(255,255,255,0.3);
    }
  </style>
</head>
<body>

    <div class="glow glow-purple-tl"></div>

    <div class="safe-zone"></div>

  <!-- Toolbar -->
  <div class="toolbar">
    <button class="save-btn" id="saveBtn" onclick="savePNG()">Save as PNG</button>
    <span class="hint">1584 &times; 396px — ready for LinkedIn</span>
  </div>

  <!-- html2canvas from CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script>
    async function savePNG() {
      const btn = document.getElementById('saveBtn');
      btn.disabled = true;
      btn.textContent = 'Rendering...';

      try {
        const banner = document.querySelector('.banner');
        const canvas = await html2canvas(banner, {
          width: 1584,
          height: 396,
          scale: 1,          // 1:1 pixel output
          useCORS: true,
          backgroundColor: '#22184C',
        });

        // Trigger download
        const link = document.createElement('a');
        link.download = 'neural-summary-linkedin-banner.png';
        link.href = canvas.toDataURL('image/png');
        link.click();

        btn.textContent = 'Saved!';
        setTimeout(() => {
          btn.disabled = false;
          btn.textContent = 'Save as PNG';
        }, 2000);
      } catch (err) {
        console.error('Export failed:', err);
        btn.textContent = 'Failed — try screenshot';
        setTimeout(() => {
          btn.disabled = false;
          btn.textContent = 'Save as PNG';
        }, 3000);
      }
    }
  </script>
