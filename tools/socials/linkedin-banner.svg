<svg xmlns="http://www.w3.org/2000/svg" width="1584" height="396" viewBox="0 0 1584 396">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1040"/>
      <stop offset="50%" stop-color="#23194B"/>
      <stop offset="100%" stop-color="#1d1245"/>
    </linearGradient>

    <!-- Glow for decorative arcs -->
    <linearGradient id="arc1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8D6AFA" stop-opacity="0"/>
      <stop offset="40%" stop-color="#8D6AFA" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#14D0DC" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="arc2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#14D0DC" stop-opacity="0"/>
      <stop offset="50%" stop-color="#14D0DC" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#8D6AFA" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="arc3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8D6AFA" stop-opacity="0.08"/>
      <stop offset="60%" stop-color="#3F38A0" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#14D0DC" stop-opacity="0"/>
    </linearGradient>

    <!-- Subtle radial glow behind logo -->
    <radialGradient id="logoGlow" cx="0.15" cy="0.5" r="0.35">
      <stop offset="0%" stop-color="#8D6AFA" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#8D6AFA" stop-opacity="0"/>
    </radialGradient>

    <!-- Tagline accent line gradient -->
    <linearGradient id="accentLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8D6AFA"/>
      <stop offset="100%" stop-color="#14D0DC"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1584" height="396" fill="url(#bg)"/>

  <!-- Radial glow behind logo area -->
  <rect width="1584" height="396" fill="url(#logoGlow)"/>

  <!-- Decorative arcs — abstract, geometric, evoking the neural/sound-wave motif -->
  <!-- Large sweeping arc top-right -->
  <ellipse cx="1300" cy="-60" rx="600" ry="320" fill="none" stroke="url(#arc1)" stroke-width="1.5" opacity="0.6"/>
  <ellipse cx="1320" cy="-80" rx="650" ry="350" fill="none" stroke="url(#arc2)" stroke-width="1" opacity="0.4"/>

  <!-- Mid arcs flowing through center -->
  <ellipse cx="800" cy="500" rx="700" ry="300" fill="none" stroke="url(#arc3)" stroke-width="1.5" opacity="0.5"/>
  <ellipse cx="820" cy="520" rx="750" ry="320" fill="none" stroke="url(#arc1)" stroke-width="1" opacity="0.3"/>

  <!-- Small decorative arc bottom-left -->
  <ellipse cx="200" cy="450" rx="350" ry="200" fill="none" stroke="url(#arc2)" stroke-width="1" opacity="0.3"/>

